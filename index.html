
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#004d2c">
    <title>Zorion | Intelligence in Field</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Leaflet Assets -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
      body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
      
      /* Correções globais para Leaflet */
      .leaflet-container { 
        height: 100%; 
        width: 100%; 
        z-index: 1;
        outline: none;
      }
      
      .custom-marker { background-color: #004d2c; border: 2px solid white; border-radius: 50%; width: 1.25rem; height: 1.25rem; box-shadow: 0 4px 12px rgba(0, 77, 44, 0.3); }
      .custom-marker.needs-visit { background-color: #ef4444; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }
      
      .animate-fade-in { animation: fadeIn 0.4s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      .clip-path-arrow {
        clip-path: polygon(0% 0%, 85% 0%, 100% 50%, 85% 100%, 0% 100%, 15% 50%);
      }
      .clip-path-arrow:first-child {
        clip-path: polygon(0% 0%, 85% 0%, 100% 50%, 85% 100%, 0% 100%);
      }
      .clip-path-arrow:last-child {
        clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 15% 50%);
      }
      
      /* Custom Popup Styling */
      .custom-popup-zorion .leaflet-popup-content-wrapper {
        border-radius: 1.5rem;
        padding: 0.5rem;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      }
      .custom-popup-zorion .leaflet-popup-tip {
        background: white;
      }
    </style>
</head>
  <body class="bg-slate-50 text-slate-900 antialiased overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
